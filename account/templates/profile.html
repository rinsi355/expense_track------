<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Expense Tracker</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            /* Matches signup and login pages exactly */
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
        }

        .profile-card {
            width: 450px;
            background: #fff;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .profile-card h2 {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 25px;
            text-align: center;
        }

        .info-label {
            font-weight: 600;
            color: #4b5563;
        }

        .info-value {
            color: #1f2937;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <h2>My Profile</h2>
        
        <!-- Profile Information List -->
        <div class="mb-4">
            <div class="d-flex justify-content-between border-bottom py-2">
                <span class="info-label">Username:</span>
                <span class="info-value">{{ request.user.username }}</span>
            </div>
            <div class="d-flex justify-content-between border-bottom py-2">
                <span class="info-label">Email:</span>
                <span class="info-value">{{ request.user.email }}</span>
            </div>
            <div class="d-flex justify-content-between border-bottom py-2">
                <span class="info-label">Date Joined:</span>
                <span class="info-value">{{ request.user.date_joined|date:"Y-m-d" }}</span>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="d-grid gap-2">
            <a href="{% url 'expense_dashboard' %}" class="btn btn-primary py-2">Dashboard</a>
            <a href="{% url 'logout' %}" class="btn btn-outline-danger py-2">Logout</a>
        </div>
    </div>

</body>
</html>
