<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Expense Tracker</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            /* Same vibrant purple/blue gradient from your signup page */
            background: linear-gradient(135deg, #4F46E5, #7C3AED);
        }

        .login-card {
            width: 420px;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .login-card h2 {
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 25px;
            text-align: center;
        }

        /* Matches the button design precisely */
        .btn-signup {
            background-color: #0d6efd;
            color: white;
            border: none;
        }

        .btn-signup:hover {
            background-color: #0b5ed7;
            color: white;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Login</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <!-- Username Field -->
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>

            <!-- Password Field -->
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <!-- Submit Button (using the same style naming/look as signup) -->
            <button type="submit" class="btn btn-signup w-100 py-2">Login</button>
        </form>

        <!-- Redirect back to Signup -->
        <p class="text-center mt-4 mb-0">
            Don't have an account? <a href="/signup/">Sign Up</a>
        </p>
    </div>

</body>
</html>
