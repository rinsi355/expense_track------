<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <!-- Tailwind CSS to match dashboard theme -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">

    <!-- Card Wrapper Container -->
    <div class="max-w-md w-full bg-white border border-gray-200 p-8 rounded-2xl shadow-sm">
        
        <!-- Header -->
        <div class="mb-6 text-center">
            <h2 class="text-3xl font-bold text-gray-900 tracking-tight">Create Account</h2>
            <p class="text-sm text-gray-500 mt-2">Get started with your custom Expense Dashboard</p>
        </div>

        <!-- Form Layout -->
        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <!-- Username Field -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Username:</label>
                <input type="text" name="username" placeholder="Username" required 
                    class="w-full text-sm border border-gray-300 rounded-lg px-3.5 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition bg-white text-gray-900">
            </div>

            <!-- Email Field -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Email:</label>
                <input type="email" name="email" placeholder="Email" required 
                    class="w-full text-sm border border-gray-300 rounded-lg px-3.5 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition bg-white text-gray-900">
            </div>

            <!-- Password Field -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Password:</label>
                <input type="password" name="password" placeholder="Password" required 
                    class="w-full text-sm border border-gray-300 rounded-lg px-3.5 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition bg-white text-gray-900">
            </div>

            <!-- Confirm Password Field -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1.5">Confirm Password:</label>
                <input type="password" name="confirm_password" placeholder="Confirm Password" required 
                    class="w-full text-sm border border-gray-300 rounded-lg px-3.5 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition bg-white text-gray-900">
            </div>

            <!-- Submit Button -->
            <div class="pt-2">
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-sm py-2.5 px-4 rounded-lg shadow-sm transition">
                    Signup
                </button>
            </div>
        </form>

        <!-- Redirect Link Footer -->
        <p class="text-center text-sm text-gray-500 mt-6 pt-4 border-t border-gray-100">
            Already have an account? 
            <a href="/login/" class="font-medium text-indigo-600 hover:text-indigo-700 transition">Login</a>
        </p>

    </div>

</body>
</html>
